name: Docs

on:
  workflow_dispatch:

  push:
    branches:
      - main
    tags:
      - "*"
    paths:
      - "docs/**"
      - "src/**"
      - "*.toml"
      - ".github/workflows/Docs.yml"

  pull_request:
    branches:
      - main
    paths:
      - "docs/**"
      - "src/**"
      - "*.toml"
      - ".github/workflows/Docs.yml"
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  doctest:
    name: Documentation doctest
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: julia-actions/setup-julia@v3
        with:
          version: "1"

      - name: Use Julia cache
        uses: julia-actions/cache@v3

      - name: Instantiate environment with development version of the package
        run: |
          julia --project=docs -e '
            using Pkg
            Pkg.develop(PackageSpec(path=pwd()))
            Pkg.instantiate()'

      - name: Run doctest
        run: |
          julia --project=docs -e '
            using Documenter: DocMeta, doctest
            using ParallelMCMC
            DocMeta.setdocmeta!(ParallelMCMC, :DocTestSetup, :(using ParallelMCMC); recursive=true)
            doctest(ParallelMCMC)'

      - name: Build documentation without deploy
        run: julia --project=docs docs/make.jl
        env:
          JULIA_PKG_SERVER: ""
          GKSwstype: "100"
          DOCUMENTER_KEY: ""

  deploy:
    name: Deploy documentation
    runs-on: ubuntu-latest
    needs: doctest

    if: github.event_name != 'pull_request'

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: julia-actions/setup-julia@v3
        with:
          version: "1"

      - name: Use Julia cache
        uses: julia-actions/cache@v3

      - name: Instantiate environment with development version of the package
        run: |
          julia --project=docs -e '
            using Pkg
            Pkg.develop(PackageSpec(path=pwd()))
            Pkg.instantiate()'

      - name: Generate and deploy documentation
        run: julia --project=docs docs/make.jl
        env:
          JULIA_PKG_SERVER: ""
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}
          GKSwstype: "100"
